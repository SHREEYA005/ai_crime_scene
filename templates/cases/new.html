{% extends 'base.html' %}
{% block title %}New Case{% endblock %}
{% block content %}
<h2 class="mb-4">📁 Create New Case</h2>
<div class="row">
  <div class="col-md-6">
    <div class="card bg-secondary">
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Case Title *</label>
            <input type="text" class="form-control" name="title" placeholder="e.g. Park Street Incident" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" name="location" placeholder="e.g. 42 Park Street, Chennai">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Create Case</button>
            <a href="/cases/" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
